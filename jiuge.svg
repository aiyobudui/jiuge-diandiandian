<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- 主背景渐变：深蓝到浅蓝对角渐变 -->
    <radialGradient id="bgGrad" cx="35%" cy="65%" r="65%" fx="25%" fy="75%">
      <stop offset="0%" stop-color="#1a3b6e"/>
      <stop offset="25%" stop-color="#085ec3"/>
      <stop offset="50%" stop-color="#3d8be0"/>
      <stop offset="75%" stop-color="#8bdbf7"/>
      <stop offset="100%" stop-color="#e7f5fc"/>
    </radialGradient>
    <!-- 内发光效果 -->
    <radialGradient id="innerGlow" cx="30%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- 边缘光晕 -->
    <radialGradient id="edgeShine" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="95%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- 阴影 -->
  <ellipse cx="64" cy="130" rx="50" ry="8" fill="rgba(0,0,0,0.15)"/>

  <!-- 主体圆形 -->
  <circle cx="64" cy="64" r="58" fill="url(#bgGrad)"/>

  <!-- 内发光层 -->
  <circle cx="64" cy="64" r="58" fill="url(#innerGlow)"/>

  <!-- 边缘光晕 -->
  <circle cx="64" cy="64" r="58" fill="url(#edgeShine)"/>

  <!-- 高光弧线 -->
  <path d="M 30 45 Q 45 30 70 28" stroke="rgba(255,255,255,0.5)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 25 55 Q 38 42 58 38" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
